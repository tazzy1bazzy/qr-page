<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR - scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;

            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: #1f283d;

            background-color: #d5e1ef;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: center;

            min-height: 600px;
            width: 360px;
            background-color: #FFFFFF;
            border-radius: 20px;
            padding-top: 10px;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            padding-top: 30px;
            padding-left: 30px;
            padding-right: 30px;
            text-align: center;
        }

        .qr-image {
            border-radius: 20px;
        }

        h4 {
            margin: 0;
            padding: 0;
            font: inherit;
            color: inherit;
        }

        .description {
            margin-top: 20px;
            color: #7b879d;
            font-size: 1.1rem;
            line-height: 1.8rem;
        }

        .title {
            font-size: 1.5rem;
            line-height: 2rem;
            font-weight: 700;
        }

    </style>
</head>
<body>
    <main>
        <div class="container">
            <img class="qr-image" src="./images/image-qr-code.png" alt="QR Code" width="330" height="330">
            <div class="content">
                <h4 class="title">
                    Improve your front-end
                    skills by building projects
                </h4>
                <p class="description">
                    Scan the QR code to visit Frontend
                    Mentor and take your coding skills to
                    the next level
                </p>
            </div>
        </div>
    </main>
</body>
</html>
